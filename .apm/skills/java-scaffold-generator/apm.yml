name: java-scaffold-generator
type: skill
version: 1.0.0
description: Scaffold Java Hexagonal Architecture projects from template with dynamic module selection and token substitution

# Skill-specific triggers (when user says these, skill activates)
triggers:
  - create Java project
  - new hexagonal project
  - scaffold microservice
  - create hexagonal architecture repository
  - new Java service
  - create microservice
  - generate project

# Optional argument hint for user
argument-hint: "Optionally provide the project name or namespace (e.g.: payment-service, com.example.payments)"

# Skill-specific dependencies
dependencies:
  mcp:
    - name: io.github.github/github-mcp-server
      tools:
        - get_file_contents
      required: true
