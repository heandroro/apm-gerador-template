name: apm-gerador-template
version: 1.0.0
description: APM package for scaffolding Java Hexagonal Architecture projects from a template repository, generating locally by default.
author: heandroro
license: MIT
type: skill
includes: auto

dependencies:
  mcp:
    - name: io.github.github/github-mcp-server
      tools: ["get_file_contents"]
      env:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
