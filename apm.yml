name: apm-gerador-template
version: 1.0.0
description: APM package for scaffolding Java Hexagonal Architecture projects from
  a template repository, generating locally by default. Reads template data via gh CLI
  (or git clone fallback) for dynamic module selection and token substitution.
author: heandroro
license: MIT
type: hybrid
includes: auto

# Package-level dependencies (Optional — fallback if gh CLI not available)
dependencies:
  mcp:
    # GitHub MCP server — Optional fallback for advanced GitHub integration
    - name: io.github.github/github-mcp-server
      tools:
        - get_file_contents  # Advanced: read additional files if needed
      env:
        GITHUB_TOKEN: ${GITHUB_TOKEN}  # Optional, only needed for MCP usage
      required: false

# Explicit skill references
skills:
  - name: gerador-scaffold-java
    path: .apm/skills/gerador-scaffold-java
