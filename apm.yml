name: apm-gerador-template
version: 1.0.0
description: APM package for scaffolding Java Hexagonal Architecture projects from
  a template repository, generating locally by default. Reads template data via GitHub
  MCP (gh CLI fallback ≤40 files) for dynamic module selection and token substitution.
author: heandroro
license: MIT
type: hybrid
includes: auto

# Package-level dependencies
dependencies:
  mcp:
    - name: io.github.github/github-mcp-server
      tools:
        - get_file_contents
      required: true

# Explicit skill references
skills:
  - name: gerador-scaffold-java
    path: .apm/skills/gerador-scaffold-java
